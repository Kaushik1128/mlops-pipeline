name: CI

# Run the unit tests on every push and pull request to main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        # LEARN: only the minimal test deps — NOT the full requirements.txt.
        # The tests target pure-function modules with synthetic inputs, so the
        # heavy/conflicting serving + orchestration deps aren't needed.
        run: pip install -r requirements-test.txt

      - name: Run tests
        run: pytest

# =============================================================================
# Local MLOps stack — MinIO, Postgres, MLflow, Prefect.
#
# Usage:
#   1. cp .env.example .env  (and fill in values)
#   2. docker compose up -d
#   3. docker compose ps      (verify all services healthy)
#   4. docker compose down    (stop; keeps volumes)
#   5. docker compose down -v (stop AND delete volumes — full reset)
# =============================================================================

name: mlops-pipeline

# -----------------------------------------------------------------------------
# Services
# -----------------------------------------------------------------------------
services:

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage
  # Holds model artifacts, datasets, drift reports. Anything boto3 can read
  # from real AWS S3, our code can read from here.
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z

    container_name: mlops-minio

    restart: unless-stopped

    networks:
      - mlops-net

    ports:
      - "9000:9000"  # S3 API — what boto3 / MLflow talk to
      - "9001:9001"  # Web console — what humans click around in

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

    volumes:
      - minio_data:/data

    command: server /data --console-address ":9001"

    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Postgres — MLflow's metadata backend (runs, params, metrics, registry)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: mlops-postgres
    restart: unless-stopped

    networks:
      - mlops-net

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # createbuckets — one-shot init container. Creates the MLflow artifact
  # bucket in MinIO, then exits. MLflow depends on this completing.
  # ---------------------------------------------------------------------------
  createbuckets:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: mlops-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - mlops-net
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MLFLOW_ARTIFACT_BUCKET: ${MLFLOW_ARTIFACT_BUCKET}
      DVC_STORAGE_BUCKET: ${DVC_STORAGE_BUCKET}
    entrypoint: >
      /bin/sh -c "
      set -e;
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/$${MLFLOW_ARTIFACT_BUCKET};
      mc mb --ignore-existing local/$${DVC_STORAGE_BUCKET};
      echo 'Bucket ready: '$${MLFLOW_ARTIFACT_BUCKET};
      "

    restart: "no"

  # ---------------------------------------------------------------------------
  # MLflow tracking server — metadata in Postgres, artifacts in MinIO.
  # ---------------------------------------------------------------------------
  mlflow:
    build:
      context: ./docker/mlflow
      dockerfile: Dockerfile

    image: mlops-pipeline/mlflow:0.1.0

    container_name: mlops-mlflow
    restart: unless-stopped
    networks:
      - mlops-net

    depends_on:
      postgres:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully

    ports:
      - "5000:5000"

    environment:
      # The MLflow server needs S3 credentials to write artifacts to MinIO on
      # behalf of clients (proxy mode). Clients themselves don't need these.
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}

    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD_ENCODED}@postgres:5432/${POSTGRES_DB}
      --artifacts-destination s3://${MLFLOW_ARTIFACT_BUCKET}/
      --serve-artifacts
      --host 0.0.0.0
      --port 5000

    healthcheck:
      # MLflow's UI root returns 200 OK once the server is ready.
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Prefect server — workflow orchestration for the auto-retraining flow.
  # ---------------------------------------------------------------------------
  prefect:
    image: prefecthq/prefect:3.7.5-python3.11
    container_name: mlops-prefect
    restart: unless-stopped
    networks:
      - mlops-net

    ports:
      - "4200:4200"

    environment:
      PREFECT_HOME: /data

      PREFECT_SERVER_API_HOST: 0.0.0.0

      PREFECT_API_URL: http://localhost:4200/api

    volumes:
      - prefect_data:/data

    command: prefect server start --host 0.0.0.0

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # fraud-service — BentoML model server.
  # Serves the @staging model as a REST API. On startup it imports the current
  # @staging model from MLflow, so a restart picks up a newly promoted model.
  # ---------------------------------------------------------------------------
  fraud-service:
    build:
      context: .
      dockerfile: docker/serving/Dockerfile
    image: mlops-pipeline/fraud-service:0.1.0
    container_name: mlops-fraud-service
    restart: unless-stopped
    networks:
      - mlops-net

    depends_on:
      mlflow:
        condition: service_healthy

    ports:
      - "3000:3000"  # REST API + Swagger UI — humans and other systems call this

    environment:
      BENTOML_DO_NOT_TRACK: "True"
      MLFLOW_TRACKING_URI: http://mlflow:5000
      FRAUD_DECISION_THRESHOLD: ${FRAUD_DECISION_THRESHOLD:-0.5}

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3000/readyz')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Prometheus — scrapes /metrics from services and stores them as time series
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: mlops-prometheus
    restart: unless-stopped
    networks:
      - mlops-net
    ports:
      - "9090:9090"  # Prometheus UI + query interface
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus  # time-series DB persists across restarts
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus

  # ---------------------------------------------------------------------------
  # Grafana — dashboards querying Prometheus
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.3.0
    container_name: mlops-grafana
    restart: unless-stopped
    networks:
      - mlops-net
    ports:
      - "3001:3000"
    environment:
      # Anonymous admin access for a local demo — no login wall.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  mlops-net:
    driver: bridge

# -----------------------------------------------------------------------------
# Volumes — named volumes for state that must survive container restarts.
# -----------------------------------------------------------------------------
volumes:
  minio_data:

  postgres_data:
    # MLflow's metadata DB (runs, params, metrics, model registry).
    # Same reasoning: DBs are I/O sensitive, named volume wins.

  prefect_data:
    # Prefect server's SQLite DB (flow run history).
    # We declare it now so Phase 6 doesn't require Compose-file surgery.

  prometheus_data:
    # Prometheus time-series database — keeps metric history across restarts.

  grafana_data:
    # Grafana's own DB (dashboards created in-UI, prefs). Provisioned dashboards
    # come from mounted files, but in-UI changes persist here.

# NOTE: Deliberately NO `mlflow_data` volume. MLflow itself is stateless in
# this design — its metadata lives in `postgres_data`, its artifacts live in
# `minio_data`. That separation is the whole point. If we added a third
# volume here we'd be hinting that MLflow stores something locally, which
# would be misleading.
